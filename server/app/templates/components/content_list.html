<section
    class="bg-slate-900/60 rounded-xl border border-slate-800/80 overflow-hidden shadow-2xl"
>
    <table class="w-full text-left border-collapse">
        <thead>
            <tr
                class="border-b border-slate-800 bg-slate-900 text-[11px] font-semibold text-slate-400 uppercase tracking-wider"
            >
                <th class="py-3.5 px-4 w-10">Mark</th>
                <th class="py-3.5 px-4">Title / Source</th>
                <th class="py-3.5 px-4">Type</th>
                <th class="py-3.5 px-4">Status</th>
                <th class="py-3.5 px-4">Summary</th>
                <th class="py-3.5 px-4 text-right">Actions</th>
            </tr>
        </thead>
        <tbody id="content-table-body" class="divide-y divide-slate-800/50">
            {% for item in items %} {% include "components/content_row.html" %}
            {% else %}
            <tr>
                <td
                    colspan="6"
                    class="py-12 text-center text-slate-500 text-sm"
                >
                    No matching content found for these filters.
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</section>
